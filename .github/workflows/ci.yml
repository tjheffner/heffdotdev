name: CI

# Fast, deterministic gate so formatting / type / build regressions are caught
# on PRs instead of slipping through (the e2e workflow only runs against a
# deployed Netlify preview).
on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    name: Format, typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20 # matches netlify.toml
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check + svelte-check
        run: npm run lint

# example netlify.toml
[build]
  command = "npm run build"
  publish = "build"

[functions]
  directory = "functions"
  node_bundler = "esbuild"
  external_node_modules = ["mdsvex", "@resvg/resvg-js"]
  # adapter-netlify's read() from $app/server reads fonts via a runtime path
  # string that esbuild can't trace, so the OG image's .ttf assets never get
  # zipped into the Lambda -> ENOENT -> 500. Force them into the bundle.
  included_files = [".netlify/server/**/*.ttf"]

[build.environment]
  NODE_VERSION = "22"

[[headers]]
  ## https://answers.netlify.com/t/content-type-header-not-working-in-netlify-toml/7718
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    Cache-Control = "public, max-age=4000"
    # cache just over 1 hour for webpagetest to be happy
    X-Content-Type-Options = "nosniff"
    ## Content-Security-Policy = "default-src 'self'; script-src 'nonce-swyx'; img-src *"
